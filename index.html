<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="BELLYSHOP 상담형 쇼핑몰">
  <title>BELLYSHOP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <button id="menuBtn" class="icon-btn" aria-label="메뉴">☰</button>
      <a href="#" class="logo">BELLYSHOP</a>
      <div class="header-actions">
        <button id="searchToggleBtn" class="icon-btn" aria-label="검색">⌕</button>
        <button id="adminOpenBtn" class="text-btn">관리자</button>
      </div>
    </div>
    <div class="category-tabs">
      <button class="tab active" data-view="all">전체</button>
      <button class="tab" data-view="new">신상품</button>
      <button class="tab" data-view="popular">인기상품</button>
      <button class="tab" data-view="featured">추천상품</button>
    </div>
    <div id="searchBar" class="search-bar hidden">
      <input id="searchInput" type="search" placeholder="상품명을 검색하세요">
      <select id="categoryFilter"><option value="">전체 카테고리</option></select>
    </div>
  </header>

  <aside id="sideMenu" class="side-menu">
    <div class="side-head">
      <strong>BELLYSHOP</strong>
      <button id="menuCloseBtn" class="icon-btn">×</button>
    </div>
    <button data-view="all">전체 상품</button>
    <button data-view="new">신상품</button>
    <button data-view="popular">인기상품</button>
    <button data-view="featured">추천상품</button>
    <button id="sideAdminBtn">관리자 로그인</button>
  </aside>
  <div id="overlay" class="overlay hidden"></div>

  <main>
    <section class="hero-wrap">
      <div id="heroSlider" class="hero-slider"></div>
      <div id="heroDots" class="hero-dots"></div>
    </section>

    <section id="newSection" class="product-section">
      <div class="section-title-row">
        <div><p>NEW ARRIVAL</p><h2>신상품</h2></div>
        <button class="more-btn" data-view="new">더보기 ›</button>
      </div>
      <div id="newGrid" class="product-grid"></div>
    </section>

    <section id="popularSection" class="product-section">
      <div class="section-title-row">
        <div><p>BEST ITEMS</p><h2>인기상품</h2></div>
        <button class="more-btn" data-view="popular">더보기 ›</button>
      </div>
      <div id="popularGrid" class="product-grid"></div>
    </section>

    <section id="featuredSection" class="product-section">
      <div class="section-title-row">
        <div><p>EDITOR'S PICK</p><h2>추천상품</h2></div>
        <button class="more-btn" data-view="featured">더보기 ›</button>
      </div>
      <div id="featuredGrid" class="product-grid"></div>
    </section>

    <section id="allSection" class="product-section">
      <div class="section-title-row">
        <div><p>ALL PRODUCTS</p><h2>전체 상품</h2></div>
      </div>
      <div id="allGrid" class="product-grid"></div>
      <div id="emptyState" class="empty hidden">등록된 상품이 없습니다.</div>
    </section>
  </main>

  <footer>
    <div>
      <strong id="footerBrand">BELLYSHOP</strong>
      <p id="footerText">상품 상담은 카카오톡 문의를 이용해 주세요.</p>
    </div>
    <p>© BELLYSHOP</p>
  </footer>

  <button id="talkBtn" class="talk-btn">TALK</button>
  <div class="bottom-bar">
    <button id="shareBtn">공유하기</button>
    <button id="cartOpenBtn">견적함 <span id="cartCount">0</span></button>
  </div>

  <dialog id="productDialog" class="dialog product-dialog">
    <button class="dialog-close" data-close="productDialog">×</button>
    <div id="productDetail"></div>
  </dialog>

  <dialog id="cartDialog" class="dialog">
    <button class="dialog-close" data-close="cartDialog">×</button>
    <h2>견적함</h2>
    <div id="cartItems"></div>
    <label class="field"><span>문의 내용</span><textarea id="cartMessage" rows="4" placeholder="수량, 색상, 궁금한 점을 적어주세요."></textarea></label>
    <div class="dialog-actions">
      <button id="copyInquiryBtn" class="light-btn">문의내용 복사</button>
      <button id="contactInquiryBtn" class="dark-btn">카카오톡 문의</button>
    </div>
  </dialog>

  <dialog id="loginDialog" class="dialog small">
    <button class="dialog-close" data-close="loginDialog">×</button>
    <p class="admin-kicker">ADMIN</p>
    <h2>관리자 로그인</h2>
    <form id="loginForm">
      <label class="field"><span>아이디</span><input id="adminId" value="admin" autocomplete="username" required></label>
      <label class="field"><span>비밀번호</span><input id="adminPassword" type="password" autocomplete="current-password" required></label>
      <p id="loginError" class="error"></p>
      <button class="dark-btn full" type="submit">로그인</button>
    </form>
  </dialog>

  <dialog id="adminDialog" class="dialog admin-dialog">
    <button class="dialog-close" data-close="adminDialog">×</button>
    <div class="admin-top">
      <div><p class="admin-kicker">BELLYSHOP ADMIN</p><h2>통합 관리자</h2></div>
      <div class="dialog-actions">
        <button id="bannerBtn" class="light-btn">배너 관리</button>
        <button id="settingsBtn" class="light-btn">사이트 설정</button>
        <button id="logoutBtn" class="danger-btn">로그아웃</button>
      </div>
    </div>

    <form id="productForm" class="admin-form">
      <input id="productId" type="hidden">
      <label class="field"><span>상품명 *</span><input id="pName" required></label>
      <label class="field"><span>카테고리 *</span><input id="pCategory" list="categoryList" required></label>
      <datalist id="categoryList"></datalist>
      <label class="field"><span>판매가 *</span><input id="pPrice" type="number" min="0" required></label>
      <label class="field"><span>정상가</span><input id="pOriginalPrice" type="number" min="0"></label>
      <label class="field span-2"><span>대표 이미지 URL *</span><input id="pImage" type="url" required placeholder="https://..."></label>
      <label class="field span-2"><span>추가 이미지 URL</span><textarea id="pImages" rows="3" placeholder="한 줄에 주소 하나씩"></textarea></label>
      <label class="field span-2"><span>상품 설명 *</span><textarea id="pDescription" rows="5" required></textarea></label>
      <label class="check"><input id="pNew" type="checkbox" checked> 신상품</label>
      <label class="check"><input id="pPopular" type="checkbox"> 인기상품</label>
      <label class="check"><input id="pFeatured" type="checkbox"> 추천상품</label>
      <label class="check"><input id="pSoldout" type="checkbox"> 품절</label>
      <label class="check"><input id="pVisible" type="checkbox" checked> 공개</label>
      <div class="form-actions span-2">
        <button id="cancelEditBtn" type="button" class="light-btn hidden">수정 취소</button>
        <button type="submit" class="dark-btn">상품 저장</button>
      </div>
    </form>

    <div class="admin-list-wrap">
      <h3>등록된 상품</h3>
      <div id="adminProductList" class="admin-list"></div>
    </div>
  </dialog>

  <dialog id="bannerDialog" class="dialog">
    <button class="dialog-close" data-close="bannerDialog">×</button>
    <h2>메인 배너 관리</h2>
    <form id="bannerForm">
      <input id="bannerId" type="hidden">
      <label class="field"><span>상단 작은 문구</span><input id="bEyebrow" placeholder="NEW COLLECTION"></label>
      <label class="field"><span>배너 제목 *</span><input id="bTitle" required></label>
      <label class="field"><span>배너 설명</span><input id="bSubtitle"></label>
      <label class="field"><span>배너 이미지 URL *</span><input id="bImage" type="url" required></label>
      <label class="field"><span>버튼 문구</span><input id="bButton" value="보러가기"></label>
      <label class="field"><span>연결 주소</span><input id="bLink" placeholder="#allSection 또는 https://..."></label>
      <label class="check"><input id="bVisible" type="checkbox" checked> 공개</label>
      <div class="dialog-actions">
        <button id="cancelBannerEditBtn" type="button" class="light-btn hidden">수정 취소</button>
        <button type="submit" class="dark-btn">배너 저장</button>
      </div>
    </form>
    <div id="bannerList" class="admin-list banner-list"></div>
  </dialog>

  <dialog id="settingsDialog" class="dialog">
    <button class="dialog-close" data-close="settingsDialog">×</button>
    <h2>사이트 설정</h2>
    <form id="settingsForm">
      <label class="field"><span>상호명</span><input id="sBrand"></label>
      <label class="field"><span>카카오톡/상담 URL</span><input id="sContactUrl" type="url" placeholder="https://pf.kakao.com/..."></label>
      <label class="field"><span>전화번호</span><input id="sPhone"></label>
      <label class="field"><span>이메일</span><input id="sEmail" type="email"></label>
      <label class="field"><span>하단 안내문</span><input id="sFooter"></label>
      <button class="dark-btn full" type="submit">설정 저장</button>
    </form>
  </dialog>

  <div id="toast" class="toast"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
