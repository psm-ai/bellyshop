<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="BELLYSHOP 상담형 쇼핑몰">
  <title>BELLYSHOP</title>
  <link rel="stylesheet" href="style.css?v=20260715-2">
</head>
<body>
  <header class="header">
    <div class="header-row">
      <button id="menuBtn" class="icon-btn" aria-label="메뉴">☰</button>
      <a href="#" class="logo">BELLYSHOP</a>
      <div class="header-actions">
        <button id="searchBtn" class="icon-btn" aria-label="검색">⌕</button>
        <button id="adminBtn" class="admin-btn">관리자</button>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="all">전체</button>
      <button class="tab" data-view="new">신상품</button>
      <button class="tab" data-view="popular">인기상품</button>
      <button class="tab" data-view="featured">추천상품</button>
    </nav>
    <div id="searchPanel" class="search-panel hidden">
      <input id="searchInput" type="search" placeholder="상품명 또는 설명 검색">
      <select id="categoryFilter"><option value="">전체 카테고리</option></select>
    </div>
  </header>

  <aside id="drawer" class="drawer">
    <div class="drawer-head"><strong>BELLYSHOP</strong><button id="drawerClose" class="icon-btn">×</button></div>
    <button data-view="all">전체 상품</button>
    <button data-view="new">신상품</button>
    <button data-view="popular">인기상품</button>
    <button data-view="featured">추천상품</button>
    <button id="drawerAdmin">관리자 로그인</button>
  </aside>
  <div id="overlay" class="overlay hidden"></div>

  <main>
    <section class="hero-area">
      <div id="heroSlider" class="hero-slider"></div>
      <div id="heroDots" class="hero-dots"></div>
    </section>

    <section id="homeSections">
      <section class="section" id="newSection">
        <div class="section-head"><div><small>NEW ARRIVAL</small><h2>신상품</h2></div><button data-view="new" class="more">더보기 ›</button></div>
        <div id="newGrid" class="grid"></div>
      </section>

      <section class="section" id="popularSection">
        <div class="section-head"><div><small>BEST ITEMS</small><h2>인기상품</h2></div><button data-view="popular" class="more">더보기 ›</button></div>
        <div id="popularGrid" class="grid"></div>
      </section>

      <section class="section" id="featuredSection">
        <div class="section-head"><div><small>EDITOR'S PICK</small><h2>추천상품</h2></div><button data-view="featured" class="more">더보기 ›</button></div>
        <div id="featuredGrid" class="grid"></div>
      </section>
    </section>

    <section class="section" id="allSection">
      <div class="section-head"><div><small>ALL PRODUCTS</small><h2 id="allTitle">전체 상품</h2></div></div>
      <div id="allGrid" class="grid"></div>
      <div id="emptyState" class="empty hidden">등록된 상품이 없습니다.</div>
    </section>
  </main>

  <footer>
    <div><strong id="footerBrand">BELLYSHOP</strong><p id="footerText">상품 상담은 상담 버튼을 이용해 주세요.</p></div>
    <span>© BELLYSHOP</span>
  </footer>

  <button id="talkBtn" class="talk">TALK</button>
  <div class="bottom-bar">
    <button id="shareBtn">공유하기</button>
    <button id="cartBtn">견적함 <span id="cartCount">0</span></button>
  </div>

  <dialog id="productDialog" class="dialog">
    <button class="close" data-close="productDialog">×</button>
    <div id="productDetail"></div>
  </dialog>

  <dialog id="cartDialog" class="dialog">
    <button class="close" data-close="cartDialog">×</button>
    <h2>견적함</h2>
    <div id="cartItems"></div>
    <label class="field"><span>문의 내용</span><textarea id="cartMessage" rows="4" placeholder="수량, 색상, 궁금한 점을 적어주세요."></textarea></label>
    <div class="actions">
      <button id="copyInquiry" class="light">문의내용 복사</button>
      <button id="contactInquiry" class="dark">상담 요청</button>
    </div>
  </dialog>

  <dialog id="loginDialog" class="dialog small">
    <button class="close" data-close="loginDialog">×</button>
    <small class="kicker">ADMIN</small>
    <h2>관리자 로그인</h2>
    <form id="loginForm">
      <label class="field"><span>아이디</span><input id="adminId" value="admin" required autocomplete="username"></label>
      <label class="field"><span>비밀번호</span><input id="adminPassword" type="password" required autocomplete="current-password"></label>
      <p id="loginError" class="error"></p>
      <button type="submit" class="dark full">로그인</button>
    </form>
  </dialog>

  <dialog id="adminDialog" class="dialog admin-dialog">
    <button class="close" data-close="adminDialog">×</button>
    <div class="admin-top">
      <div><small class="kicker">BELLYSHOP ADMIN</small><h2>통합 관리자</h2></div>
      <div class="actions">
        <button id="categoryManageBtn" class="light">카테고리 관리</button>
        <button id="bannerManageBtn" class="light">배너 관리</button>
        <button id="settingsBtn" class="light">사이트 설정</button>
        <button id="logoutBtn" class="danger">로그아웃</button>
      </div>
    </div>

    <form id="productForm" class="admin-form">
      <input id="productId" type="hidden">
      <label class="field"><span>상품명 *</span><input id="pName" required></label>
      <label class="field"><span>카테고리 *</span>
        <select id="pCategory" required>
          <option value="">카테고리를 선택하세요</option>
        </select>
      </label>
      <label class="field"><span>판매가 *</span><input id="pPrice" type="number" min="0" required></label>
      <label class="field"><span>정상가</span><input id="pOriginalPrice" type="number" min="0"></label>
      <label class="field span-2"><span>대표 이미지 URL *</span><input id="pImage" type="url" required placeholder="https://..."></label>
      <label class="field span-2"><span>추가 이미지 URL</span><textarea id="pImages" rows="3" placeholder="한 줄에 주소 하나씩"></textarea></label>
      <label class="field span-2"><span>상품 설명 *</span><textarea id="pDescription" rows="5" required></textarea></label>
      <label class="check"><input id="pNew" type="checkbox" checked> 신상품</label>
      <label class="check"><input id="pPopular" type="checkbox"> 인기상품</label>
      <label class="check"><input id="pFeatured" type="checkbox"> 추천상품</label>
      <label class="check"><input id="pSoldout" type="checkbox"> 품절</label>
      <label class="check"><input id="pVisible" type="checkbox" checked> 공개</label>
      <div class="actions span-2">
        <button id="cancelProductEdit" type="button" class="light hidden">수정 취소</button>
        <button type="submit" class="dark">상품 저장</button>
      </div>
    </form>

    <section class="admin-list-section">
      <h3>등록된 상품</h3>
      <div id="adminProductList" class="admin-list"></div>
    </section>
  </dialog>


  <dialog id="categoryDialog" class="dialog">
    <button class="close" data-close="categoryDialog">×</button>
    <h2>카테고리 관리</h2>
    <p class="category-help">상품 등록에 사용할 카테고리를 직접 추가하고 이름을 변경하거나 삭제할 수 있습니다.</p>
    <form id="categoryForm" class="category-form">
      <input id="categoryId" type="hidden">
      <label class="field category-name-field">
        <span>카테고리 이름 *</span>
        <input id="categoryName" maxlength="30" required placeholder="예: 크로스백">
      </label>
      <label class="field category-order-field">
        <span>정렬 순서</span>
        <input id="categoryOrder" type="number" min="0" value="0">
      </label>
      <div class="actions category-actions">
        <button id="cancelCategoryEdit" type="button" class="light hidden">수정 취소</button>
        <button type="submit" class="dark">카테고리 저장</button>
      </div>
    </form>
    <div id="categoryListAdmin" class="category-admin-list"></div>
  </dialog>

  <dialog id="bannerDialog" class="dialog">
    <button class="close" data-close="bannerDialog">×</button>
    <h2>메인 배너 관리</h2>
    <form id="bannerForm">
      <input id="bannerId" type="hidden">
      <label class="field"><span>작은 문구</span><input id="bEyebrow" placeholder="NEW COLLECTION"></label>
      <label class="field"><span>배너 제목 *</span><input id="bTitle" required></label>
      <label class="field"><span>설명</span><input id="bSubtitle"></label>
      <label class="field"><span>이미지 URL *</span><input id="bImage" type="url" required></label>
      <label class="field"><span>버튼 문구</span><input id="bButton" value="보러가기"></label>
      <label class="field"><span>연결 주소</span><input id="bLink" placeholder="#allSection 또는 https://..."></label>
      <label class="check"><input id="bVisible" type="checkbox" checked> 공개</label>
      <div class="actions">
        <button id="cancelBannerEdit" type="button" class="light hidden">수정 취소</button>
        <button type="submit" class="dark">배너 저장</button>
      </div>
    </form>
    <div id="bannerList" class="admin-list"></div>
  </dialog>

  <dialog id="settingsDialog" class="dialog">
    <button class="close" data-close="settingsDialog">×</button>
    <h2>사이트 설정</h2>
    <form id="settingsForm">
      <label class="field"><span>상호명</span><input id="sBrand"></label>
      <label class="field"><span>카카오톡/상담 URL</span><input id="sContactUrl" type="url" placeholder="https://pf.kakao.com/..."></label>
      <label class="field"><span>전화번호</span><input id="sPhone"></label>
      <label class="field"><span>이메일</span><input id="sEmail" type="email"></label>
      <label class="field"><span>하단 안내문</span><input id="sFooter"></label>
      <button type="submit" class="dark full">설정 저장</button>
    </form>
  </dialog>

  <div id="toast" class="toast"></div>
  <script type="module" src="app.js?v=20260715-2"></script>
</body>
</html>
