<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="BELLYSHOP 상품 상담 쇼핑몰"><title>BELLYSHOP</title><link rel="stylesheet" href="style.css"></head><body>
<header class="topbar"><a class="brand" href="#"><span class="brand-mark">B</span><span>BELLYSHOP</span></a><nav class="top-actions"><button id="adminOpenBtn" class="ghost-btn">관리자</button><button id="cartOpenBtn" class="primary-btn">견적함 <span id="cartCount">0</span></button></nav></header>
<main><section class="hero"><div><p class="eyebrow">CURATED PRODUCTS</p><h1 id="heroTitle">필요한 상품을<br>쉽고 빠르게 상담하세요.</h1><p id="heroSubtitle">상품을 확인하고 견적함에 담은 뒤 상담을 요청할 수 있습니다.</p><a href="#products" class="primary-btn inline">상품 둘러보기</a></div><div class="hero-card"><span>✓ 사이트 내 결제 없음</span><span>✓ 상품별 간편 상담</span><span>✓ PC·모바일 지원</span></div></section>
<section id="products" class="section"><div class="section-head"><div><p class="eyebrow">PRODUCTS</p><h2>상품 목록</h2></div><div class="filters"><input id="searchInput" type="search" placeholder="상품명 검색"><select id="categoryFilter"><option value="">전체 카테고리</option></select></div></div><div id="productGrid" class="product-grid"></div><div id="emptyState" class="empty hidden">등록된 상품이 없습니다.</div></section></main>
<footer><strong>BELLYSHOP</strong><p id="footerText">상품 문의는 상담 버튼을 이용해 주세요.</p></footer>
<dialog id="productDialog" class="dialog"><button class="dialog-close" data-close="productDialog">×</button><div id="productDetail"></div></dialog>
<dialog id="cartDialog" class="dialog wide"><button class="dialog-close" data-close="cartDialog">×</button><h2>견적함</h2><div id="cartItems"></div><label class="field"><span>문의 내용</span><textarea id="cartMessage" rows="4" placeholder="수량, 색상, 궁금한 점 등을 적어주세요."></textarea></label><div class="dialog-actions"><button id="copyInquiryBtn" class="ghost-btn">문의내용 복사</button><button id="contactInquiryBtn" class="primary-btn">상담 요청</button></div></dialog>
<dialog id="loginDialog" class="dialog small"><button class="dialog-close" data-close="loginDialog">×</button><h2>관리자 로그인</h2><form id="loginForm"><label class="field"><span>아이디</span><input id="adminId" value="admin" autocomplete="username" required></label><label class="field"><span>비밀번호</span><input id="adminPassword" type="password" autocomplete="current-password" required></label><p id="loginError" class="error"></p><button class="primary-btn full" type="submit">로그인</button></form></dialog>
<dialog id="adminDialog" class="dialog admin-dialog"><button class="dialog-close" data-close="adminDialog">×</button><div class="admin-head"><div><p class="eyebrow">ADMIN</p><h2>상품 관리</h2></div><div class="admin-head-actions"><button id="settingsBtn" class="ghost-btn">사이트 설정</button><button id="logoutBtn" class="danger-btn">로그아웃</button></div></div><form id="productForm" class="admin-form"><input id="productId" type="hidden"><label class="field"><span>상품명 *</span><input id="pName" required></label><label class="field"><span>카테고리 *</span><input id="pCategory" list="categoryList" required></label><datalist id="categoryList"></datalist><label class="field"><span>판매가 *</span><input id="pPrice" type="number" min="0" required></label><label class="field"><span>정상가</span><input id="pOriginalPrice" type="number" min="0"></label><label class="field span-2"><span>대표 이미지 URL *</span><input id="pImage" type="url" required placeholder="https://..."></label><label class="field span-2"><span>추가 이미지 URL</span><textarea id="pImages" rows="3" placeholder="한 줄에 주소 하나씩"></textarea></label><label class="field span-2"><span>상품 설명 *</span><textarea id="pDescription" rows="5" required></textarea></label><label class="check"><input id="pFeatured" type="checkbox"> 추천 상품</label><label class="check"><input id="pSoldout" type="checkbox"> 품절</label><label class="check"><input id="pVisible" type="checkbox" checked> 공개</label><div class="form-actions span-2"><button id="cancelEditBtn" type="button" class="ghost-btn hidden">수정 취소</button><button type="submit" class="primary-btn">상품 저장</button></div></form><div class="admin-list-wrap"><h3>등록된 상품</h3><div id="adminProductList" class="admin-list"></div></div></dialog>
<dialog id="settingsDialog" class="dialog"><button class="dialog-close" data-close="settingsDialog">×</button><h2>사이트 설정</h2><form id="settingsForm"><label class="field"><span>메인 제목</span><input id="sHeroTitle"></label><label class="field"><span>메인 설명</span><input id="sHeroSubtitle"></label><label class="field"><span>카카오톡/상담 URL</span><input id="sContactUrl" type="url" placeholder="https://pf.kakao.com/..."></label><label class="field"><span>전화번호</span><input id="sPhone" placeholder="010-0000-0000"></label><label class="field"><span>이메일</span><input id="sEmail" type="email"></label><label class="field"><span>하단 안내문</span><input id="sFooter"></label><button class="primary-btn full" type="submit">설정 저장</button></form></dialog>
<div id="toast" class="toast"></div><script type="module" src="app.js"></script></body></html>
