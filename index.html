<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111111" />
  <title>BELLYSHOP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <button class="icon-btn" id="menuBtn" aria-label="메뉴">☰</button>
    <a class="brand" href="./">BELLYSHOP</a>
    <button class="icon-btn" id="searchBtn" aria-label="검색">⌕</button>
  </header>

  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <strong>카테고리</strong>
      <button class="icon-btn" id="closeDrawer">×</button>
    </div>
    <button class="drawer-link active" data-category="전체">전체 상품</button>
    <button class="drawer-link" data-category="가방">가방</button>
    <a class="drawer-link" id="drawerKakao" href="#" target="_blank">카카오톡 문의</a>
  </aside>
  <div class="overlay" id="overlay"></div>

  <main>
    <section class="hero">
      <div class="hero-content">
        <span>NEW COLLECTION</span>
        <h1>새로운 컬렉션</h1>
        <p>감각적인 상품을 한눈에 확인하세요.</p>
        <button id="heroBrowse">보러가기</button>
      </div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2>신상품</h2>
        <button class="text-btn" data-show="new">더보기 ›</button>
      </div>
      <div class="horizontal-products" id="newProducts"></div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2>인기상품</h2>
        <button class="text-btn" data-show="popular">더보기 ›</button>
      </div>
      <div class="horizontal-products" id="popularProducts"></div>
    </section>

    <section class="section catalog" id="catalog">
      <div class="catalog-toolbar">
        <div class="tabs">
          <button class="tab active" data-filter="전체">모두</button>
          <button class="tab" data-filter="신상품">새로운</button>
          <button class="tab" data-filter="인기">인기상품</button>
        </div>
        <select id="sortSelect" aria-label="정렬">
          <option value="latest">최신순</option>
          <option value="name">이름순</option>
        </select>
      </div>

      <div class="search-panel" id="searchPanel">
        <input id="searchInput" type="search" placeholder="상품명, 코드, 색상 검색" />
      </div>

      <div class="product-grid" id="productGrid"></div>
      <p class="empty" id="emptyState">검색 결과가 없습니다.</p>
    </section>
  </main>

  <a class="floating-kakao" id="floatingKakao" href="#" target="_blank" aria-label="카카오톡 문의">
    TALK
  </a>

  <div class="bottom-bar">
    <button id="shareSite">공유하기</button>
    <a id="bottomKakao" href="#" target="_blank">카카오톡 문의</a>
  </div>

  <dialog id="productDialog">
    <div class="dialog-wrap">
      <button class="dialog-close" id="dialogClose">×</button>
      <div class="detail-gallery">
        <img id="detailMainImage" alt="" />
        <div class="thumbs" id="detailThumbs"></div>
      </div>
      <div class="detail-info">
        <span class="badge" id="detailStatus"></span>
        <h2 id="detailName"></h2>
        <dl>
          <div><dt>상품코드</dt><dd id="detailCode"></dd></div>
          <div><dt>사이즈</dt><dd id="detailSize"></dd></div>
          <div><dt>색상</dt><dd id="detailColor"></dd></div>
        </dl>
        <p id="detailDescription"></p>
        <a id="detailKakao" class="detail-kakao" href="#" target="_blank">카카오톡 문의하기</a>
        <button id="detailShare" class="detail-share">상품 공유하기</button>
      </div>
    </div>
  </dialog>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
